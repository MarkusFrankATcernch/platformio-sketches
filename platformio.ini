; =============================================================================
;
; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
;
;==============================================================================
;
[platformio]
default_envs = esp32dev
;
[common]
build_flags       = --include=/home/frankm/Arduino/sketches/sources/util/platformio.h
                    -I/home/frankm/Arduino/sketches/sources
                    -I/home/frankm/Arduino/libraries/TFT_eSPI
                    -std=c++17 -Wno-unused-function -DLV_CONF_SKIP=1
;                    --verbose
;                    -DCONFIG_LITTLEFS_FOR_IDF_3_2
lib_deps_lvgl     = lvgl
lib_deps_fs       = littlefs
lib_deps_default  = Wire
;
;==============================================================================
[env]
framework         = arduino
monitor_speed     = 115200
upload_speed      = 230400
upload_protocol   = esptool
lib_compat_mode   = strict
build_flags       = ${common.build_flags}
lib_deps          = ${common.lib_deps_lvgl}, ${common.lib_deps_default}, ${common.lib_deps_fs}
;
;
;==============================================================================
[env:esp32dev]
platform          = espressif32
board             = esp32dev
build_flags       = ${common.build_flags} -DARDUINO_VARIANT=\"esp32dev\"
;
; =============================================================================
[env:esp32-c3-super-mini]
platform          = espressif32
board             = esp32-c3-devkitc-02
upload_speed      = 921600
board_build.mcu   = esp32c3
build_flags       = ${common.build_flags} -DESP32=1 -DARDUINO_VARIANT=\"lolin_c3_mini\"
;
; =============================================================================
[env:lolin_s2_mini]
platform          = espressif32
board             = lolin_s2_mini
upload_speed      = 921600
board_build.mcu   = esp32s2
build_flags       = ${common.build_flags} -DESP32=1 -DARDUINO_VARIANT=\"lolin_s2_mini\"
;
; =============================================================================
; These are the ESP32 C3 super mini from aliexpress
; =============================================================================
; espressif platform version required for I2C:   espressif32@~5.0.0
; see here:  https://community.platformio.org/t/i2cwritereadnonstop-vscode-platformio-esp32/33789/13
[env:lolin_c3_mini]
platform          = espressif32
board             = lolin_c3_mini
upload_speed      = 921600
board_build.mcu   = esp32c3
build_flags       = ${common.build_flags} -DESP32=1 -DARDUINO_VARIANT=\"lolin_c3_mini\"
;
; =============================================================================
; Default for ESP8266 Wemos mini 
; =============================================================================
[env:wemos-d1]
platform          = espressif8266
board             = d1
build_flags       = ${env.build_flags} -DESP8266=1 -DARDUINO_VARIANT=\"ESP8266\"
; change microcontroller
board_build.mcu   = esp8266
; change MCU frequency
board_build.f_cpu = 80000000L
;
; =============================================================================
[env:stm32]
platform          = ststm32
board             = genericSTM32F412CE
build_flags       = ${env.build_flags} -DSTM32=1 -DARDUINO_VARIANT=\"STM32\"
lib_deps          = ${common.lib_deps_default}, ${common.lib_deps_fs} FS
upload_protocol   = blackmagic
; change MCU frequency
board_build.f_cpu = 100000000L
;
;==============================================================================
[env:uno]
platform          = atmelavr
board             = uno
build_flags       = ${common.build_flags} -DARDUINO=1 -DARDUINO_VARIANT=\"ARDUINO\"
; change microcontroller
board_build.mcu   = atmega328p
board_build.f_cpu = 80000000L
monitor_speed     = 115200
; =============================================================================
